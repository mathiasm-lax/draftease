# Render Blueprint — Draftease web app + persistent Postgres database.
# Push this to your repo; Render syncs the blueprint, creates the database,
# and wires it into the app automatically.
databases:
  - name: draftease-db
    plan: free            # free Postgres (note: free DBs expire after ~30 days)
    databaseName: draftease
    user: draftease

services:
  - type: web
    name: draftease
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DRAFTEASE_SECRET_KEY
        generateValue: true          # strong secret, generated once and kept
      - key: DRAFTEASE_DB_URL
        fromDatabase:                # <-- accounts now live in Postgres, not on disk
          name: draftease-db
          property: connectionString
      - key: DRAFTEASE_HTTPS_ONLY
        value: "true"
      - key: DRAFTEASE_ALLOW_SIGNUP
        value: "true"                # set to "false" once your accounts exist
